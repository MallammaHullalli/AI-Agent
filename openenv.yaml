name: smart-bus-stop
version: "1.0.0"
description: >
  Smart Bus Stop Crowd Management environment with Passenger Notification System.
  An RL agent monitors crowd dynamics and dispatches/delays buses to optimize
  passenger experience at a BMTC-style urban bus stop.

observation_space:
  crowd_size:
    type: int
    min: 0
    max: 200
    description: Number of passengers currently waiting at the stop
  avg_waiting_time:
    type: float
    min: 0.0
    max: 60.0
    unit: minutes
    description: Average time passengers have been waiting
  bus_arrival_eta:
    type: float
    min: 0.0
    max: 30.0
    unit: minutes
    description: Estimated time until next scheduled bus arrives
  passenger_inflow_rate:
    type: float
    min: 0.0
    max: 20.0
    unit: passengers/minute
    description: Rate at which new passengers are arriving
  last_notification:
    type: str
    description: Most recent notification sent to passengers

action_space:
  - send_bus    # Dispatch an extra bus immediately
  - delay_bus   # Delay the next scheduled bus by 5 minutes
  - no_action   # Take no action, monitor only

reward_function:
  components:
    - name: crowd_cleared
      formula: "boarded * 0.5"
      description: Reward for each passenger boarded when bus dispatched
    - name: dispatch_cost
      formula: "-cfg.dispatch_cost"
      description: Penalty for dispatching an extra bus (resource cost)
    - name: delay_penalty
      formula: "-3.0 per delay action"
    - name: overcrowding_penalty
      formula: "-(crowd - 40) * 0.3 when crowd > 40"
    - name: long_wait_penalty
      formula: "-(wait - 10) * 0.5 when wait > 10 min"
    - name: good_state_bonus
      formula: "+2.0 when crowd < 20 and wait < 5"
    - name: notification_reward
      formula: "+0.5 per informative notification"

difficulty_levels:
  easy:
    max_steps: 50
    inflow_range: [1.0, 3.0]
    traffic_delay_prob: 0.0
    crowd_variance: 0
    bus_capacity: 40
    dispatch_cost: 5.0
  medium:
    max_steps: 75
    inflow_range: [1.0, 6.0]
    traffic_delay_prob: 0.1
    crowd_variance: 5
    bus_capacity: 35
    dispatch_cost: 8.0
  hard:
    max_steps: 100
    inflow_range: [2.0, 10.0]
    traffic_delay_prob: 0.25
    crowd_variance: 10
    bus_capacity: 30
    dispatch_cost: 12.0

grading:
  scale: [0.0, 1.0]
  weights:
    efficiency: 0.4
    crowd_control: 0.4
    communication: 0.2

api:
  reset: "env.reset() -> BusStopState"
  state: "env.state() -> BusStopState"
  step: "env.step(action) -> StepResult(state, reward, done, info)"
